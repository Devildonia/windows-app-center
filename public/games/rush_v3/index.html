<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Football Rush</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #fbbf24;
            --bg-glass: rgba(255, 255, 255, 0.1);
            --bg-glass-heavy: rgba(15, 23, 42, 0.8);
            --text-main: #f8fafc;
            --radius: 12px;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f172a;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #game-container {
            position: relative;
            height: 100vh;
            aspect-ratio: 9 / 16;
            background: radial-gradient(circle at center, #1e293b, #0f172a);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: auto;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #2d8a4e;
        }

        /* ── Overlay / Screen base ─────────────────────────── */
        .overlay,
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(8px);
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 0.3s ease;
            pointer-events: auto;
        }

        .screen.hidden,
        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }

        /* ── Z-Index hierarchy (CSS only – never override in JS) ─ */
        #hud {
            z-index: 10;
        }

        #touch-controls {
            z-index: 15;
        }

        #pause-btn {
            z-index: 16;
        }

        #sprint-meter {
            z-index: 10;
        }

        #intro-layer {
            z-index: 30;
            background: #000;
        }

        #menu-screen {
            z-index: 40;
        }

        #scores-screen,
        #game-over-screen,
        #pause-screen {
            z-index: 60;
        }

        #touchdown-screen {
            z-index: 55;
        }

        /* ── CSS State Machine: intro hides menu ── */
        body.intro-active #menu-screen {
            display: none !important;
            pointer-events: none !important;
        }

        body.intro-active #global-lang-bar {
            display: none !important;
        }

        body.intro-active #intro-layer {
            display: flex !important;
            opacity: 1 !important;
        }

        /* ── Panel / Buttons ────────────────────────────────── */
        .modern-panel {
            background: var(--bg-glass-heavy);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            animation: fadeInScale 0.4s ease-out;
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .menu-title {
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(to bottom right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .modern-btn {
            width: 100%;
            padding: 16px 24px;
            margin: 8px 0;
            border-radius: var(--radius);
            border: none;
            font-family: inherit;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* ── Difficulty toggle ──────────────────────────────── */
        .difficulty-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .diff-btn {
            padding: 12px;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #94a3b8;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .diff-btn.active {
            background: var(--secondary);
            color: #0f172a;
            border-color: var(--secondary);
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4);
        }

        /* ── Leaderboard ────────────────────────────────────── */
        #highscore-list {
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius);
            padding: 15px;
            margin: 20px 0;
        }

        .highscore-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .highscore-item:last-child {
            border-bottom: none;
        }

        .highscore-item .score-val {
            font-weight: 800;
            color: #fbbf24;
        }

        .no-records {
            text-align: center;
            color: #64748b;
            padding: 20px;
        }

        /* ── HUD ────────────────────────────────────────────── */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }

        .hud-item {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* ── Pause button ───────────────────────────────────── */
        #pause-btn {
            position: absolute;
            top: 60px;
            right: 15px;
            width: 44px;
            height: 44px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            pointer-events: auto;
        }

        #pause-btn:hover {
            background: rgba(59, 130, 246, 0.4);
            border-color: rgba(59, 130, 246, 0.6);
        }

        #pause-btn.hidden {
            display: none !important;
        }

        /* ── Touch Controls ─────────────────────────────────── */
        #touch-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            pointer-events: none;
        }

        .joystick-area {
            width: 110px;
            height: 110px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        #joystick-stick {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .touch-btn {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            box-shadow: 0 8px 15px rgba(59, 130, 246, 0.4);
        }

        /* ── Sprint meter ───────────────────────────────────── */
        #sprint-meter {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        #sprint-fill {
            height: 100%;
            background: var(--primary);
            width: 100%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        /* ── Language bar ───────────────────────────────────── */
        .lang-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 99;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.5));
        }

        .lang-btn {
            padding: 10px 20px;
            min-width: 70px;
            font-size: 15px;
            font-weight: 800;
            font-family: inherit;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            pointer-events: auto;
            user-select: none;
        }

        .lang-btn.active {
            background: rgba(59, 130, 246, 0.25);
            color: #93c5fd;
            border-color: rgba(59, 130, 246, 0.4);
        }

        /* ── Animations ─────────────────────────────────────── */
        @keyframes pulse {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 0.8;
            }
        }

        @keyframes bounce {
            from {
                transform: scale(1);
            }

            to {
                transform: scale(1.08);
            }
        }

        .skip-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: none;
            animation: pulse 1.5s infinite;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body class="intro-active">
    <div id="game-container">

        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-item"><span id="hud-score-label">SCORE</span>: <span id="score-val">0</span></div>
            <div class="hud-item"><span id="hud-level-label">LEVEL</span>: <span id="level-val">1</span></div>
            <div class="hud-item"><span id="hud-tackles-label">TACKLES</span>: <span id="tackles-val">0</span>/3</div>
        </div>

        <!-- Pause Button -->
        <button id="pause-btn" class="hidden" title="Pause">⏸</button>

        <!-- Language Bar -->
        <div class="lang-bar hidden" id="global-lang-bar">
            <button type="button" class="lang-btn active" id="lang-es-btn">ESP</button>
            <button type="button" class="lang-btn" id="lang-en-btn">ENG</button>
        </div>

        <!-- Canvas -->
        <canvas id="game-canvas"></canvas>

        <!-- Touch Controls -->
        <div id="touch-controls" class="hidden">
            <div class="joystick-area" id="joy-area">
                <div id="joystick-stick"></div>
            </div>
            <div class="action-btns">
                <div class="touch-btn" id="joy-sprint">BOOST</div>
            </div>
        </div>

        <!-- Sprint Meter -->
        <div id="sprint-meter">
            <div id="sprint-fill"></div>
        </div>

        <!-- ── Screens ───────────────────────────────────────── -->

        <!-- Intro -->
        <div id="intro-layer" class="screen">
            <video id="intro-video" playsinline style="width:100%;height:100%;object-fit:cover;pointer-events:none;">
                <source src="assets/intro.mp4" type="video/mp4">
            </video>
            <div class="skip-hint" id="skip-hint-text">TAP TO SKIP</div>
        </div>

        <!-- Menu -->
        <div id="menu-screen" class="screen hidden">
            <div class="modern-panel">
                <div class="menu-title">Football Rush</div>

                <div style="margin-bottom:30px;">
                    <p id="difficulty-label"
                        style="font-size:14px;color:#94a3b8;font-weight:600;margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;">
                        DIFICULTAD</p>
                    <div class="difficulty-group">
                        <button id="diff-casual" class="diff-btn active">CASUAL</button>
                        <button id="diff-pro" class="diff-btn">PRO</button>
                    </div>
                </div>

                <button id="start-btn" class="modern-btn btn-primary">INICIAR TEMPORADA</button>
                <button id="scores-btn" class="modern-btn btn-outline">CLASIFICACIÓN</button>

                <div id="controls-hint" style="margin-top:30px;font-size:11px;color:#64748b;line-height:1.6;">
                    PC: WASD + SHIFT <br> MÓVIL: CONTROLES TÁCTILES
                    <br><br>&copy; HaDeS (A.K.A. DeViLDoNia) 2026
                </div>
            </div>
        </div>

        <!-- Scores -->
        <div id="scores-screen" class="overlay hidden">
            <div class="modern-panel">
                <div class="menu-title" id="leaderboard-title">CLASIFICACIÓN</div>
                <div class="difficulty-group" style="margin-bottom:10px;">
                    <button id="score-tab-casual" class="diff-btn active"
                        style="font-size:12px;padding:8px;">CASUAL</button>
                    <button id="score-tab-pro" class="diff-btn" style="font-size:12px;padding:8px;">PRO</button>
                </div>
                <div id="highscore-list"></div>
                <button id="close-scores-btn" class="modern-btn btn-outline">VOLVER AL MENÚ</button>
            </div>
        </div>

        <!-- Game Over -->
        <div id="game-over-screen" class="overlay hidden">
            <div class="modern-panel">
                <div class="menu-title" id="gameover-title" style="color:#ef4444;">GAME OVER</div>
                <p style="font-size:18px;color:#94a3b8;margin-bottom:20px;">
                    <span id="yardage-label">Yardas Ganadas</span>: <span id="final-score"
                        style="color:white;font-weight:800;">0</span>
                </p>
                <div style="margin-bottom:20px;">
                    <input type="text" id="player-name" placeholder="TU NOMBRE" maxlength="10"
                        style="width:100%;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:white;text-align:center;font-family:inherit;font-size:16px;font-weight:700;outline:none;box-sizing:border-box;">
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
                    <button id="retry-btn" class="modern-btn btn-primary">REINTENTAR</button>
                    <button id="menu-btn" class="modern-btn btn-outline">MENÚ</button>
                </div>
            </div>
        </div>

        <!-- Pause -->
        <div id="pause-screen" class="overlay hidden">
            <div class="modern-panel">
                <div class="menu-title" id="pause-title">PAUSA</div>
                <button id="resume-btn" class="modern-btn btn-primary">
                    <span id="resume-btn-label">▶ REANUDAR</span>
                </button>
                <button id="pause-menu-btn" class="modern-btn btn-outline">
                    <span id="pause-menu-label">🏠 MENÚ</span>
                </button>
            </div>
        </div>

        <!-- Touchdown Flash -->
        <div id="touchdown-screen" class="overlay hidden" style="background:rgba(245,166,35,0.4);pointer-events:none;">
            <h1
                style="font-size:48px;color:white;text-shadow:2px 2px 10px black;animation:bounce 0.5s infinite alternate;">
                ¡TOUCHDOWN!
            </h1>
        </div>

    </div>

    <script type="module" src="js/Game.js"></script>
</body>

</html>
