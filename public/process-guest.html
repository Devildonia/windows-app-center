<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Process Guest</title>
</head>
<body>
    <!--
      Isolated process runtime host. Lives in public/ (served verbatim, not processed
      by Vite) and loads the guest as a CLASSIC script: the iframe runs with an opaque
      origin (sandbox="allow-scripts", no allow-same-origin), where ES module fetches
      are CORS-refused but classic scripts execute. process-guest.js is generated by
      `npm run build:guest` from js/sdk/guestBoot.ts.
    -->
    <script src="./process-guest.js"></script>
</body>
</html>
